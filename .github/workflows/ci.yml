name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (verifies tsup config)
        run: npm run build

      - name: Smoke test the built bundle (CJS)
        run: |
          node -e "
          const g = require('./dist/index.cjs');
          if (g.CORE_VERSION !== '3.1.0') throw new Error('CORE_VERSION mismatch');
          if (g.LAWS.length !== 11) throw new Error('LAWS count mismatch');
          const r = g.checkMahavrata({urgency:0.95, paused:false, contains:{falseUrgency:true}});
          if (r.passes) throw new Error('manipulation should fail');
          console.log('CJS smoke OK');
          "

      - name: Smoke test the built bundle (ESM, named imports)
        run: |
          node --input-type=module -e "
          import { CORE_VERSION, LAWS, checkMahavrata, detectPatterns, wrapAgent } from './dist/index.mjs';
          if (CORE_VERSION !== '3.1.0') throw new Error('CORE_VERSION mismatch');
          if (LAWS.length !== 11) throw new Error('LAWS count mismatch');
          const r = checkMahavrata({urgency:0.95, paused:false, contains:{falseUrgency:true}});
          if (r.passes) throw new Error('manipulation should fail');
          if (typeof wrapAgent !== 'function') throw new Error('wrapAgent missing');
          if (!detectPatterns('Hurry, only 3 spots left!').falseUrgency) throw new Error('detectPatterns broken');
          console.log('ESM smoke OK');
          "
